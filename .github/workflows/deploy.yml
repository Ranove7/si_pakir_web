name: CI/CD Pipeline - SI Parkir

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  # =====================
  # BUILD & TEST
  # =====================
  build:
    name: Build & Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Backend Docker Image
        run: |
          docker build -t si_parkir_backend:test ./backend

      - name: Build Frontend Docker Image
        run: |
          docker build -t si_parkir_frontend:test ./frontend

      - name: Notify Build Success
        run: echo "✅ Build berhasil!"

  # =====================
  # DEPLOY TO VPS
  # =====================
  deploy:
    name: Deploy to VPS
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy to VPS via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          password: ${{ secrets.VPS_PASSWORD }}
          port: 22
          script: |
            echo "🚀 Memulai deployment SI Parkir..."
            
            # Masuk ke direktori project
            cd /home/ubuntu/si_pakir_web
            
            # Pull kode terbaru
            git pull origin main
            
            # Build ulang dan restart container
            docker compose down
            docker compose build --no-cache
            docker compose up -d
            
            # Hapus image lama yang tidak terpakai
            docker image prune -f
            
            echo "✅ Deployment selesai!"
            echo "🌐 Aplikasi: http://${{ secrets.VPS_HOST }}"
            echo "📊 Grafana:  http://${{ secrets.VPS_HOST }}:3000"
            echo "🔍 Prometheus: http://${{ secrets.VPS_HOST }}:9090"

      - name: Verify Deployment
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          password: ${{ secrets.VPS_PASSWORD }}
          port: 22
          script: |
            echo "🔍 Memeriksa status container..."
            docker compose -f /home/ubuntu/si_pakir_web/docker-compose.yml ps
            echo "✅ Verifikasi selesai!"
